<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poke Waikiki Staff Checklist</title>
<style>
body { font-family: Arial; padding:20px; background:#f5f5f5;}
.card {background:white; padding:15px; margin-bottom:10px; border-radius:10px;}
button {padding:10px; margin-top:10px;}
</style>
</head>

<body>

<h2>🌺 Poke Waikiki Staff Checklist</h2>

<div class="card">
<label>Staff Name</label><br>
<input id="staff-name"><br><br>

<label>Date</label><br>
<input id="eval-date" type="date"><br><br>

<label>Evaluator</label><br>
<input id="evaluator"><br>
</div>

<div class="card">
<h3>💕 Read First</h3>
<p>This checklist helps staff stay mindful every day.</p>

<h3>⚠ Basic Rules</h3>
<p>Follow rules, be honest, respect hygiene.</p>

<h3>🔥 Main Focus</h3>
<p>Keep the front clean and attractive. Customer first.</p>
</div>

<div class="card">
<button onclick="saveRecord()">Save Result</button>
</div>

<script>

function saveRecord(){

const name = document.getElementById('staff-name').value;
const date = document.getElementById('eval-date').value;
const evaluator = document.getElementById('evaluator').value;

fetch("https://script.google.com/macros/s/AKfycbz-iUxTAq9WtcX6PvizcQ3KoWOfVcHOo2kdRXuSE3Ni9IzG5sYqk6ytSYalKmwPF0w_Vw/exec",{
method:"POST",
mode:"no-cors",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({
date:date,
name:name,
evaluator:evaluator,
score:"test",
rank:"test"
})
});

alert("Saved!");
}

</script>

</body>
</html>
